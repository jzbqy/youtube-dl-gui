name: 'Publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      WINDOWS_PFX_B64: ${{ secrets.WINDOWS_PFX_B64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'ubuntu-24.04-arm'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'windows-11-arm'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust 1.94.1
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # rust-toolchain action
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-11-arm' && 'aarch64-pc-windows-msvc' || '' }}

      - name: Install cargo-about
        uses: taiki-e/install-action@0fde6d128a3d980ceac30be8c8b8739abd963b81 # v2
        with:
          tool: cargo-about

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Sentry CLI
        if: matrix.platform != 'windows-11-arm' && ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        uses: matbour/setup-sentry-cli@ac9d752ca8f44ef545fb2ce2dcd329cce57d778b # v2
        with:
          version: 2.58.2
          token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          organization: ${{ secrets.SENTRY_ORG }}
          project: ${{ secrets.SENTRY_PROJECT }}

      - name: Override tauri-cli (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04' || matrix.platform == 'ubuntu-24.04-arm'
        shell: bash
        run: |
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --locked --force
          echo "TAURI_BUNDLER_NEW_APPIMAGE_FORMAT=true" >> $GITHUB_ENV

      - name: Install tauri-cli
        if: matrix.platform != 'ubuntu-24.04' && matrix.platform != 'ubuntu-24.04-arm'
        shell: bash
        run: |
          cargo install tauri-cli

      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: "true"
        with:
          tagName: app-v__VERSION__
          releaseName: 'Open Video Downloader v__VERSION__'
          releaseBody: "## 中文定制版\n\n### 新增功能\n- 添加简体中文语言支持\n- 默认语言设置为简体中文\n\n### 改进\n- 使用中国大陆习惯的中文用词（视频、音频、播放列表等）\n- 语言选择界面简化\n\n### 技术细节\n- 更新 src/locales/zh-CN.json\n- 更新 src/i18n.ts\n- 更新 src/helpers/subtitles/languages.ts\n\nSee the assets to download this version and install. If you have an existing install, it will auto-update on launch."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: 'cargo tauri'
          args: ${{ matrix.args }}

      - name: Create public PDBs (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $kitsRoot = "${Env:ProgramFiles(x86)}\Windows Kits\10"
          if (-not (Test-Path $kitsRoot)) {
            Write-Error "Windows 10 Kits folder not found at $kitsRoot"
          }

          $arch = if ($env:RUNNER_ARCH -eq 'ARM64') { 'arm64' } else { 'x64' }
          $pdbcopy = Get-ChildItem -Path $kitsRoot -Recurse -Filter "pdbcopy.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\$arch\\pdbcopy\.exe$" } |
            Select-Object -First 1

          if (-not $pdbcopy -and $env:RUNNER_ARCH -eq 'ARM64') {
            $pdbcopy = Get-ChildItem -Path $kitsRoot -Recurse -Filter "pdbcopy.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\x64\\pdbcopy\.exe$" } |
              Select-Object -First 1
          }

          if (-not $pdbcopy) {
            Write-Error "pdbcopy.exe not found under $kitsRoot"
          }

          $pdbs = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.pdb"
          if (-not $pdbs) {
            Write-Error "No PDB files found under src-tauri/target/release"
          }

          $publicDir = "src-tauri/target/release/public-pdb"
          New-Item -ItemType Directory -Path $publicDir -Force | Out-Null

          foreach ($pdb in $pdbs) {
            $outPath = Join-Path $publicDir $pdb.Name
            & "$($pdbcopy.FullName)" "$($pdb.FullName)" "$outPath" -p
          }

      - name: Upload debug symbols to Sentry
        if: matrix.platform != 'windows-11-arm'
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          SENTRY_RELEASE="ovd@${VERSION}"
          export SENTRY_RELEASE
          
          echo "Using Sentry release: $SENTRY_RELEASE"
          
          cd src-tauri
          
          if [ -d "target/release/public-pdb" ]; then
            sentry-cli debug-files upload --include-sources target/release/public-pdb
          else
            sentry-cli debug-files upload --include-sources target/release
          fi
          
          if [ "${{ matrix.platform }}" = "ubuntu-24.04" ]; then
            sentry-cli releases new "$SENTRY_RELEASE" || true
            sentry-cli releases set-commits "$SENTRY_RELEASE" --auto || true
            sentry-cli releases finalize "$SENTRY_RELEASE" || true
          fi

      - name: Fetch tool binaries for MSIX (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run manifest:fetch

      - name: Bundle Portable Version (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $layoutRoot = "portable-layout"
          $portableFolder = "ovd-portable"

          $pkg = Get-Content -Raw "package.json" | ConvertFrom-Json
          $version = $pkg.version
          
          $arch = if ($env:RUNNER_ARCH -eq 'ARM64') { 'arm64' } else { 'x64' }
          
          $zipName = "Open.Video.Downloader_$($version)_$($arch)-portable.zip"
          $exeName = "Open.Video.Downloader_$($version)_$($arch).exe"
          $keepFileName = ".keep"
          
          $tagName = "app-v$version"
          Write-Host "Building portable bundle for $arch architecture: $zipName"
          Write-Host "Using release tag: $tagName"
          
          $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" | Where-Object { $_.Name -notmatch "setup" } | Select-Object -First 1
          if (-not $exe) { Write-Error "Could not find main exe in $releaseDir" }
          
          New-Item -ItemType Directory -Path "$layoutRoot/$portableFolder" -Force | Out-Null
          New-Item -ItemType File -Path "$layoutRoot/$portableFolder/$keepFileName" -Value "Do not remove this file or directory." -Force | Out-Null
          Copy-Item $exe.FullName -Destination "$layoutRoot/$exeName" -Force
          
          Compress-Archive -Path "$layoutRoot/*" -DestinationPath $zipName -Force
      
          echo "PORTABLE_ASSET=$zipName" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tagName" >> $env:GITHUB_ENV

      - name: Upload Portable (Windows only)
        if: matrix.platform == 'windows-latest' || matrix.platform == 'windows-11-arm'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading ${PORTABLE_ASSET} to release ${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" "${PORTABLE_ASSET}" --clobber

      - name: Install VC++ runtime (Windows ARM64 only)
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "vc_redist.arm64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vc14/vc_redist.arm64.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/install","/quiet","/norestart" -Wait

