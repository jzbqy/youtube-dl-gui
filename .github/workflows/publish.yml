name: 'Publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  create-release-and-build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: setup node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: install Rust 1.94.1
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # rust-toolchain action
        with:
          toolchain: 1.94.1

      - name: Install cargo-about
        uses: taiki-e/install-action@0fde6d128a3d980ceac30be8c8b8739abd963b81 # v2
        with:
          tool: cargo-about

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate licenses
        run: npm run licenses

      - name: Install tauri-cli
        shell: bash
        run: |
          cargo install tauri-cli

      - name: Get release info
        id: release-info
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=app-v$VERSION" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release-info.outputs.tag }}
          releaseName: 'Open Video Downloader v${{ steps.release-info.outputs.version }} (Simplified Chinese)'
          releaseBody: '## 中文定制版

### 新增功能
- 添加完整的简体中文翻译
- 默认语言设置为简体中文
- 使用中国大陆习惯的中文用词（视频、音频、播放列表等）

### 关于构建版本

此复刻版本目前仅提供 Windows 平台的构建版本，原因如下：

1. **签名证书要求**：
   - macOS 应用必须经过 Apple 签名和公证才能正常运行
   - Windows 应用签名可以避免 SmartScreen 安全警告
   - 获得这些签名需要付费的开发者账号（Apple $99/年，Windows 签名证书约 $200+/年）

2. **其他平台的可替代方案**：
   - macOS 和 Linux 用户可以直接复刻此仓库到自己的 GitHub 账号，利用 GitHub Actions 免费构建服务
   - 具体构建步骤可参考原项目的 CONTRIBUTING.md

3. **保留完整的自动更新功能**：
   - Windows 版本保留了完整的自动更新功能

如需其他平台的官方签名版本，请使用原作者的官方版本。

See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          tauriScript: 'cargo tauri'
          args: ''
          force: true

      - name: Bundle Portable Version
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $layoutRoot = "portable-layout"
          $portableFolder = "ovd-portable"

          $pkg = Get-Content -Raw "package.json" | ConvertFrom-Json
          $version = $pkg.version
          
          $arch = "x64"
          
          $zipName = "Open.Video.Downloader_$($version)_$($arch)-portable.zip"
          $exeName = "Open.Video.Downloader_$($version)_$($arch).exe"
          $keepFileName = ".keep"
          
          $tagName = "app-v$version"
          Write-Host "Building portable bundle for $arch architecture: $zipName"
          Write-Host "Using release tag: $tagName"
          
          $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" | Where-Object { $_.Name -notmatch "setup" } | Select-Object -First 1
          if (-not $exe) { Write-Error "Could not find main exe in $releaseDir" }
          
          New-Item -ItemType Directory -Path "$layoutRoot/$portableFolder" -Force | Out-Null
          New-Item -ItemType File -Path "$layoutRoot/$portableFolder/$keepFileName" -Value "Do not remove this file or directory." -Force | Out-Null
          Copy-Item $exe.FullName -Destination "$layoutRoot/$exeName" -Force
          
          Compress-Archive -Path "$layoutRoot/*" -DestinationPath $zipName -Force
      
          echo "PORTABLE_ASSET=$zipName" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$tagName" >> $env:GITHUB_ENV

      - name: Upload Portable
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Uploading ${PORTABLE_ASSET} to release ${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" "${PORTABLE_ASSET}" --clobber